<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movie Addict</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#111;
color:white;
}

header{
background:#e50914;
padding:20px;
text-align:center;
font-size:30px;
font-weight:bold;
}

.search{
text-align:center;
margin:20px;
}

input{
padding:10px;
width:300px;
border:none;
border-radius:20px;
outline:none;
}

.movies{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:20px;
padding:20px;
}

.card{
width:220px;
background:#222;
border-radius:10px;
overflow:hidden;
transition:.3s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
height:300px;
object-fit:cover;
}

.card h3{
padding:10px;
}

.card p{
padding:0 10px 15px;
color:gold;
}
</style>

</head>
<body>

<header>🎬 Movie Addict</header>

<div class="search">
<input type="text" id="search" placeholder="Search Movie...">
</div>

<div class="movies" id="movies">

<div class="card">
<img src="https://picsum.photos/220/300?1">
<h3>Avatar</h3>
<p>⭐ 7.8</p>
</div>

<div class="card">
<img src="https://picsum.photos/220/300?2">
<h3>Avengers</h3>
<p>⭐ 8.6</p>
</div>

<div class="card">
<img src="https://picsum.photos/220/300?3">
<h3>Batman</h3>
<p>⭐ 8.3</p>
</div>

<div class="card">
<img src="https://picsum.photos/220/300?4">
<h3>Joker</h3>
<p>⭐ 8.5</p>
</div>

</div>

<script>

const search=document.getElementById("search");

search.addEventListener("keyup",()=>{

const value=search.value.toLowerCase();

const cards=document.querySelectorAll(".card");

cards.forEach(card=>{

const title=card.querySelector("h3").innerText.toLowerCase();

if(title.includes(value)){
card.style.display="block";
}else{
card.style.display="none";
}

});

});

</script>

</body>
</html>
